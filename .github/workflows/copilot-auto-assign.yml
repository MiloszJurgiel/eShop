name: copilot-auto-assign

on:
  issues:
    types:
      - labeled

permissions:
  issues: write

jobs:
  copilot-auto-assign:
    if: ${{ github.event.label.name == 'copilot' }}
    runs-on: ubuntu-latest
    concurrency:
      group: copilot-auto-assign-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Assign issue to Copilot cloud agent
        env:
          COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # The default GITHUB_TOKEN cannot assign the Copilot bot, so use COPILOT_ASSIGN_PAT.
          cat > payload.json <<EOF
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "${REPOSITORY}",
              "base_branch": "${BASE_BRANCH}",
              "custom_agent": "backend-fixer"
            }
          }
          EOF

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${COPILOT_ASSIGN_PAT}" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/assignees" \
            --data @payload.json