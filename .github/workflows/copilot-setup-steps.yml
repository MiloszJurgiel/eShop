name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # The Aspire workload is intentionally NOT installed because we do not build the AppHost in CI.
      - name: Restore solution
        run: dotnet restore eShop.sln || dotnet restore eShop.slnx

      - name: Build in-scope API and test projects
        run: |
          dotnet build src/Catalog.API/Catalog.API.csproj --configuration Release --no-restore
          dotnet build src/Basket.API/Basket.API.csproj --configuration Release --no-restore
          dotnet build src/Ordering.API/Ordering.API.csproj --configuration Release --no-restore
          dotnet build src/Identity.API/Identity.API.csproj --configuration Release --no-restore
          dotnet build tests/Catalog.FunctionalTests/Catalog.FunctionalTests.csproj --configuration Release --no-restore
          dotnet build tests/Basket.UnitTests/Basket.UnitTests.csproj --configuration Release --no-restore
          dotnet build tests/Ordering.UnitTests/Ordering.UnitTests.csproj --configuration Release --no-restore
          dotnet build tests/Ordering.FunctionalTests/Ordering.FunctionalTests.csproj --configuration Release --no-restore
