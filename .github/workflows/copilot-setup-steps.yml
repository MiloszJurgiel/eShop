name: copilot-setup-steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    name: copilot-setup-steps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup repository SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'nuget.config', 'Directory.Packages.props', 'src/**/*.csproj', 'tests/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Explore is read-only and backend-fixer is scoped to backend microservices,
      # so keep setup limited to the backend service slice instead of the whole solution.
      # Aspire workload is intentionally not installed because this workflow does not build the AppHost in CI.
      - name: Restore backend agent projects
        run: |
          projects=(
            src/Catalog.API/Catalog.API.csproj
            src/Basket.API/Basket.API.csproj
            src/Ordering.API/Ordering.API.csproj
            src/Identity.API/Identity.API.csproj
            tests/Catalog.FunctionalTests/Catalog.FunctionalTests.csproj
            tests/Basket.UnitTests/Basket.UnitTests.csproj
            tests/Ordering.UnitTests/Ordering.UnitTests.csproj
            tests/Ordering.FunctionalTests/Ordering.FunctionalTests.csproj
          )

          for project in "${projects[@]}"; do
            dotnet restore "$project"
          done

